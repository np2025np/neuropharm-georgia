<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Soft shadow filter -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle glow for the central molecule -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Radial gradient for the rounded square background -->
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2A6862"/>
      <stop offset="100%" stop-color="#1F4F4A"/>
    </radialGradient>
  </defs>
  
  <!-- Rounded square background (GitHub app icon style) -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" 
        fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Inner content - hexagonal molecule -->
  <g transform="translate(128, 128)">
    
    <!-- Subtle background hexagon (atmospheric depth) -->
    <g opacity="0.15" stroke="#FAFAF7" stroke-width="2" fill="none">
      <polygon points="0,-72 62,-36 62,36 0,72 -62,36 -62,-36"/>
    </g>
    
    <!-- Main hexagonal molecule with bonds -->
    <g stroke="#FAFAF7" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Hexagonal bonds -->
      <line x1="0" y1="-56" x2="48" y2="-28"/>
      <line x1="48" y1="-28" x2="48" y2="28"/>
      <line x1="48" y1="28" x2="0" y2="56"/>
      <line x1="0" y1="56" x2="-48" y2="28"/>
      <line x1="-48" y1="28" x2="-48" y2="-28"/>
      <line x1="-48" y1="-28" x2="0" y2="-56"/>
    </g>
    
    <!-- Vertex atoms -->
    <g fill="#FAFAF7">
      <circle cx="0" cy="-56" r="9"/>
      <circle cx="48" cy="-28" r="9"/>
      <circle cx="48" cy="28" r="9"/>
      <circle cx="0" cy="56" r="9"/>
      <circle cx="-48" cy="28" r="9"/>
      <circle cx="-48" cy="-28" r="9"/>
    </g>
    
    <!-- Central glowing molecule (coral accent) -->
    <g filter="url(#glow)">
      <circle cx="0" cy="0" r="14" fill="#F36633"/>
      <circle cx="0" cy="0" r="9" fill="#FF8055"/>
    </g>
    
  </g>
</svg>
