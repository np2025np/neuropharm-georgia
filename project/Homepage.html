<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<title>Neuropharm Georgia — საიმედო ფარმაცევტული პარტნიორი</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="homepage.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ui_kits/website/Primitives.jsx"></script>
<script type="text/babel" src="homepage.visuals.jsx"></script>
<script type="text/babel" src="homepage.i18n.jsx"></script>
<script type="text/babel" src="pages.i18n.jsx"></script>
<script type="text/babel" src="homepage.sections.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [lang, setLang] = useState('KA');
  const [dark, setDark] = useState(() => /dark/.test(location.hash));
  const t = homeT[lang];

  useEffect(() => {
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    document.documentElement.lang = t.locale;
    document.documentElement.classList.toggle('force-mobile', /mobile/.test(location.hash));
  }, [dark, t.locale]);

  return (
    <>
      <HomeHeader lang={lang} setLang={setLang} dark={dark} setDark={setDark} t={t} currentPage="home"/>
      <main>
        <HomeHero t={t}/>
        <TrustStrip t={t}/>
        <Services t={t}/>
        <Sourcing t={t}/>
        <AboutPreview t={t}/>
        <QualityBand t={t}/>
        <PartnersCTA t={t}/>
        <NewsGrid t={t}/>
      </main>
      <HomeFooter t={t} lang={lang} setLang={setLang}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
