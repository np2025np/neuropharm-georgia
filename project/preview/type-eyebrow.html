<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Eyebrow</title>
<link rel="stylesheet" href="_base.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .ey { font-family: var(--font-sans); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: #F36633; }
  .ey-b { display: inline-flex; align-items: center; gap: 12px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: #1F4F4A; }
  .ey-b::before, .ey-b::after { content: ""; display: block; width: 32px; height: 1px; background: currentColor; }
  h3 { font-family: var(--font-serif); font-size: 28px; margin: 6px 0 0; color: #1F4F4A; }
</style></head><body>
<div class="card">
  <div class="stack">
    <div>
      <div class="ey">Our products</div>
      <h3>Three therapeutic categories</h3>
    </div>
    <div>
      <div class="ey-b">Georgia · Since 2014</div>
      <h3>A pharmaceutical importer you can trust</h3>
    </div>
  </div>
</div>
</body></html>
