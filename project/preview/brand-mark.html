<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brain mark</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .pane { padding: 28px; display: flex; align-items: center; justify-content: space-around; min-height: 180px; }
  .light { background: #FAFAF7; color: #1F4F4A; }
  .dark { background: #0B1F1D; color: #FAFAF7; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item svg { color: currentColor; }
  .sz { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
</style></head><body>
<div class="card">
  <div class="pane light">
    <div class="item">
      <svg width="96" height="72" viewBox="0 0 240 180" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M118 30 C 90 22, 60 30, 46 50 C 32 64, 28 82, 36 96 C 28 108, 36 124, 52 130 C 60 142, 78 148, 96 142 C 104 150, 116 150, 118 142 Z"/>
        <path d="M122 30 C 150 22, 180 30, 194 50 C 208 64, 212 82, 204 96 C 212 108, 204 124, 188 130 C 180 142, 162 148, 144 142 C 136 150, 124 150, 122 142 Z"/>
        <path d="M120 30 L120 150"/>
      </svg>
      <span class="sz">96px</span>
    </div>
    <div class="item">
      <svg width="48" height="36" viewBox="0 0 240 180" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round">
        <path d="M118 30 C 90 22, 60 30, 46 50 C 32 64, 28 82, 36 96 C 28 108, 36 124, 52 130 C 60 142, 78 148, 96 142 C 104 150, 116 150, 118 142 Z"/>
        <path d="M122 30 C 150 22, 180 30, 194 50 C 208 64, 212 82, 204 96 C 212 108, 204 124, 188 130 C 180 142, 162 148, 144 142 C 136 150, 124 150, 122 142 Z"/>
        <path d="M120 30 L120 150"/>
      </svg>
      <span class="sz">48px</span>
    </div>
  </div>
  <div class="pane dark">
    <div class="item">
      <svg width="96" height="72" viewBox="0 0 240 180" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M118 30 C 90 22, 60 30, 46 50 C 32 64, 28 82, 36 96 C 28 108, 36 124, 52 130 C 60 142, 78 148, 96 142 C 104 150, 116 150, 118 142 Z"/>
        <path d="M122 30 C 150 22, 180 30, 194 50 C 208 64, 212 82, 204 96 C 212 108, 204 124, 188 130 C 180 142, 162 148, 144 142 C 136 150, 124 150, 122 142 Z"/>
        <path d="M120 30 L120 150"/>
      </svg>
      <span class="sz">on dark</span>
    </div>
  </div>
</div>
</body></html>
