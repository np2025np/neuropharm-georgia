<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { background: white; border: 1px solid #E5E5E0; border-radius: 10px; height: 100px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .n { font-family: var(--font-sans); font-size: 12px; color: #1F4F4A; font-weight: 600; }
  .v { font-family: var(--font-mono); font-size: 10px; color: #4A4A45; }
  .xs { box-shadow: 0 1px 2px rgba(15,30,28,0.04); }
  .sm { box-shadow: 0 2px 6px rgba(15,30,28,0.05), 0 1px 2px rgba(15,30,28,0.04); }
  .md { box-shadow: 0 6px 16px rgba(15,30,28,0.07), 0 2px 4px rgba(15,30,28,0.04); }
  .lift { box-shadow: 0 10px 24px rgba(15,30,28,0.08), 0 2px 6px rgba(15,30,28,0.04); }
</style></head><body>
<div class="card" style="background:#FAFAF7; padding: 32px;">
  <div class="row">
    <div class="item xs"><span class="n">shadow-xs</span><span class="v">card rest</span></div>
    <div class="item sm"><span class="n">shadow-sm</span><span class="v">dropdowns</span></div>
    <div class="item md"><span class="n">shadow-md</span><span class="v">card hover</span></div>
    <div class="item lift"><span class="n">shadow-lift</span><span class="v">modals</span></div>
  </div>
</div>
</body></html>
