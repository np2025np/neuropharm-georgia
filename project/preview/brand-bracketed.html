<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Eyebrow bracketed</title>
<link rel="stylesheet" href="_base.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 22px; align-items: center; padding: 12px 0; }
  .ey { display: inline-flex; align-items: center; gap: 12px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; }
  .ey::before, .ey::after { content: ""; display: block; width: 32px; height: 1px; background: currentColor; }
  .teal { color: #1F4F4A; }
  .coral { color: #F36633; }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); margin-top: 14px; text-align: center; }
</style></head><body>
<div class="card">
  <div class="stack">
    <div class="ey teal">Georgia · Since 2014</div>
    <div class="ey coral">Healthcare professionals</div>
    <div class="ey teal">Annual report 2024</div>
  </div>
  <div class="note">"Bracketed eyebrow" · echoes the — GEORGIA — device in the logo</div>
</div>
</body></html>
