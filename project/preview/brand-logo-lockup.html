<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logo lockup</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; }
  .card { padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .pane { padding: 32px; display: flex; align-items: center; justify-content: center; min-height: 200px; }
  .light { background: #FAFAF7; }
  .dark { background: #0B1F1D; }
  .pane img { width: 280px; height: auto; }
</style></head><body>
<div class="card">
  <div class="pane light"><img src="../assets/logo-lockup.svg" alt="Neuropharm Georgia"></div>
  <div class="pane dark"><img src="../assets/logo-lockup.svg" alt="" style="filter: invert(1) hue-rotate(180deg) brightness(1.2);"></div>
</div>
</body></html>
