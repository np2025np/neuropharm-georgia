<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Header</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 0; margin: 0; }
  .card { padding: 0; }
  .hdr { display: flex; align-items: center; padding: 18px 32px; background: rgba(250,250,247,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid #E5E5E0; gap: 28px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo svg { width: 36px; height: 28px; color: #1F4F4A; }
  .brand { font-family: var(--font-sans); font-weight: 700; letter-spacing: 0.08em; font-size: 14px; color: #1F4F4A; }
  nav { display: flex; gap: 22px; flex: 1; }
  nav a { font-family: var(--font-sans); font-size: 14px; color: #1A1A1A; text-decoration: none; font-weight: 500; }
  nav a.active { color: #F36633; }
  .right { display: flex; align-items: center; gap: 14px; }
  .lang { display: flex; gap: 2px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; }
  .lang span { padding: 4px 8px; border-radius: 4px; color: #4A4A45; cursor: pointer; }
  .lang span.on { background: #1F4F4A; color: white; }
  .toggle { width: 38px; height: 22px; background: #E5E5E0; border-radius: 999px; position: relative; cursor: pointer; }
  .toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
</style></head><body>
<div class="card">
  <div class="hdr">
    <div class="logo">
      <svg viewBox="0 0 240 180" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M118 30 C 90 22, 60 30, 46 50 C 32 64, 28 82, 36 96 C 28 108, 36 124, 52 130 C 60 142, 78 148, 96 142 C 104 150, 116 150, 118 142 Z"/>
        <path d="M122 30 C 150 22, 180 30, 194 50 C 208 64, 212 82, 204 96 C 212 108, 204 124, 188 130 C 180 142, 162 148, 144 142 C 136 150, 124 150, 122 142 Z"/>
        <path d="M120 30 L120 150"/>
      </svg>
      <span class="brand">NEUROPHARM</span>
    </div>
    <nav>
      <a class="active">Products</a>
      <a>About</a>
      <a>Partners</a>
      <a>Quality</a>
      <a>Contact</a>
    </nav>
    <div class="right">
      <div class="lang">
        <span class="on">EN</span><span>KA</span><span>RU</span><span>PT</span>
      </div>
      <div class="toggle"></div>
    </div>
  </div>
</div>
</body></html>
