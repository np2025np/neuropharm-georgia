<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
  .row:last-child { margin-bottom: 0; }
  .btn { font-family: var(--font-sans); font-weight: 600; font-size: 14px; padding: 11px 20px; border-radius: 8px; cursor: pointer; transition: all 200ms cubic-bezier(0.4,0,0.2,1); border: 1.5px solid transparent; line-height: 1; display: inline-flex; align-items: center; gap: 8px; }
  .primary { background: #F36633; color: white; border-color: #F36633; }
  .primary.hover { background: #DA4F1E; border-color: #DA4F1E; }
  .secondary { background: transparent; color: #1F4F4A; border-color: #1F4F4A; }
  .secondary.hover { background: #1F4F4A; color: white; }
  .ghost { background: transparent; color: #1F4F4A; border-color: transparent; }
  .ghost.hover { background: #E8EFEE; }
  .lg { font-size: 16px; padding: 14px 26px; }
  .sm { font-size: 13px; padding: 8px 14px; }
  .tag { font-size: 10px; color: var(--fg-subtle); font-family: var(--font-mono); }
</style></head><body>
<div class="card">
  <div class="row">
    <button class="btn primary">Primary action</button>
    <button class="btn primary hover">Hover</button>
    <button class="btn secondary">Secondary</button>
    <button class="btn secondary hover">Hover</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn ghost hover">Hover</button>
  </div>
  <div class="row">
    <button class="btn primary lg">Large</button>
    <button class="btn primary">Default</button>
    <button class="btn primary sm">Small</button>
    <span class="tag">8px radius · 1.5px border · 200ms ease</span>
  </div>
</div>
</body></html>
