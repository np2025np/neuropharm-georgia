<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #1F4F4A; border-radius: 3px; width: 24px; }
  .v { font-family: var(--font-mono); font-size: 10px; color: #4A4A45; }
  .n { font-family: var(--font-sans); font-size: 11px; color: #1F4F4A; font-weight: 600; }
</style></head><body>
<div class="card">
  <div class="label" style="margin-bottom: 14px;">Spacing scale · 4 → 160</div>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="n">1</span><span class="v">4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="n">2</span><span class="v">8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="n">3</span><span class="v">12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="n">4</span><span class="v">16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="n">5</span><span class="v">24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="n">6</span><span class="v">32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="n">7</span><span class="v">48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="n">8</span><span class="v">64</span></div>
    <div class="item"><div class="bar" style="height:96px"></div><span class="n">9</span><span class="v">96</span></div>
    <div class="item"><div class="bar" style="height:128px"></div><span class="n">10</span><span class="v">128</span></div>
    <div class="item"><div class="bar" style="height:160px"></div><span class="n">11</span><span class="v">160</span></div>
  </div>
</div>
</body></html>
