<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 88px; height: 88px; background: #1F4F4A; }
  .meta { text-align: center; }
  .n { font-family: var(--font-sans); font-size: 12px; color: #1F4F4A; font-weight: 600; }
  .v { font-family: var(--font-mono); font-size: 10px; color: #4A4A45; display: block; }
</style></head><body>
<div class="card">
  <div class="label" style="margin-bottom: 14px;">Corner radii · restrained, max 16</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="meta"><span class="n">none</span><span class="v">0</span></div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="meta"><span class="n">sm</span><span class="v">4</span></div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="meta"><span class="n">md</span><span class="v">6</span></div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="meta"><span class="n">btn</span><span class="v">8</span></div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="meta"><span class="n">lg</span><span class="v">10</span></div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="meta"><span class="n">xl</span><span class="v">16</span></div></div>
    <div class="item"><div class="box" style="border-radius:999px; width:120px;"></div><div class="meta"><span class="n">pill</span><span class="v">999</span></div></div>
  </div>
</div>
</body></html>
