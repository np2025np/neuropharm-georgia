<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .c { background: white; border: 1px solid #E5E5E0; border-radius: 10px; padding: 22px 24px; box-shadow: 0 1px 2px rgba(15,30,28,0.04); transition: all 200ms; }
  .c.hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15,30,28,0.07), 0 2px 4px rgba(15,30,28,0.04); border-color: #C9C9C2; }
  .ey { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: #F36633; margin-bottom: 8px; }
  h4 { font-family: var(--font-serif); font-size: 18px; color: #1F4F4A; margin: 0 0 8px; font-weight: 600; }
  p { font-size: 14px; line-height: 1.55; color: #4A4A45; margin: 0; }
  .tag { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); margin-top: 12px; }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="c">
      <div class="ey">Cardiology</div>
      <h4>Beta-blocker therapies</h4>
      <p>Imported under EU-GMP and registered with the Georgian regulator.</p>
      <span class="tag">Rest · 1px shadow-xs</span>
    </div>
    <div class="c hover">
      <div class="ey">Cardiology</div>
      <h4>Beta-blocker therapies</h4>
      <p>Imported under EU-GMP and registered with the Georgian regulator.</p>
      <span class="tag">Hover · −2px lift, shadow-md</span>
    </div>
  </div>
</div>
</body></html>
